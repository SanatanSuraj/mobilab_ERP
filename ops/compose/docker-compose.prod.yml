# Instigenie ERP — production single-host stack (managed-services edition).
#
# Scope: api + worker + listen-notify + caddy. The Next.js `web` frontend
# lives on Vercel (free tier) — see apps/web/vercel.json. Postgres + both
# Redis instances live on managed providers (Neon + Upstash). All this so
# the stack fits in ~1GB RAM with headroom.
#
# Memory budget on a ~1GB host (RSS, with overhead):
#   OS + Docker daemon          ~280 MB
#   caddy                        ~30 MB
#   api   (heap cap 192 MB)     ~250 MB
#   worker (heap cap 160 MB)    ~210 MB
#   listen-notify (cap 96 MB)   ~130 MB
#   ────────────────────────────────────
#   ≈ 900 MB — still provision 2 GB swap as a safety net.
#
# Startup order (strict; enforced via depends_on + healthchecks):
#   1. listen-notify       (uses DIRECT PG URL — must NOT be a pooler.
#                           assertDirectPgUrl() exits fatally on boot
#                           if you point it at PgBouncer/Neon-pooler.)
#   2. worker              (after listen-notify)
#   3. api                 (after worker)
#   4. caddy               (after api)
#
# Required environment (place in .env or pass via your secrets manager —
# do NOT commit secrets):
#
#   VERSION                  image tag, e.g. v0.1.0 or git SHA
#
#   # Managed Postgres (e.g. Neon, Supabase, Railway):
#   DATABASE_URL             pooled URL (PgBouncer-style) used by api/worker
#   DATABASE_DIRECT_URL      DIRECT URL (no pooler) used by listen-notify.
#                            On Neon: the "direct connection" string from
#                            the dashboard, NOT the "pooled connection".
#
#   # Managed Redis (e.g. Upstash). BullMQ requires noeviction — Upstash
#   # Pro ("BullMQ-compatible") tier is required, free tier won't work.
#   REDIS_BULL_URL           rediss://default:<token>@<host>:6379
#   REDIS_CACHE_URL          rediss://default:<token>@<host>:6379  (separate db/instance recommended)
#
#   JWT_SECRET               ≥ 32-byte random; rotate via packages/auth flow
#   ESIGNATURE_PEPPER        ≥ 32-char random
#   API_PUBLIC_URL           e.g. https://api.example.com  (Caddy vhost)
#   WEB_PUBLIC_URL           e.g. https://app.example.com  (your Vercel
#                            domain — used as the api's CORS allow-list
#                            AND inlined into the Vercel build as
#                            NEXT_PUBLIC_API_BASE_URL is the inverse)
#
# Optional:
#   LOG_LEVEL                default info
#   WORKER_CONCURRENCY       default 2 (down from 4 — RAM-constrained host)
#   API_PORT                 host port to publish for api (default 4000)
#
# Schema migrations: the on-host `pnpm db:migrate` script targets a local
# Docker container and will NOT work against managed Postgres. Apply
# migrations via the workspace migrator instead, from a developer machine
# with DATABASE_URL set to the managed pooled URL:
#   DATABASE_URL=$NEON_POOLED_URL pnpm migrate:prod
#
# Deploy:
#   docker compose -f ops/compose/docker-compose.prod.yml --env-file .env up -d
#
# Tear down:
#   docker compose -f ops/compose/docker-compose.prod.yml down

name: instigenie-prod

# ─── Shared snippets (YAML anchors) ──────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-app-base: &app-base
  restart: always
  logging: *default-logging
  networks: [erp]
  # Run as the non-root user baked into the Dockerfiles. uid/gid 1001
  # matches `addgroup -g 1001` in ops/docker/*.Dockerfile.
  user: "1001:1001"

# ─── Services ────────────────────────────────────────────────────────────
services:

  listen-notify:
    <<: *app-base
    build:
      context: ../..
      dockerfile: ops/docker/listen-notify.Dockerfile
    image: ${LISTEN_NOTIFY_IMAGE:-instigenie/listen-notify:${VERSION:?VERSION required}}
    container_name: erp-listen-notify
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LISTEN_NOTIFY_PORT: 4002
      # Heap cap — listen-notify is just a PG-LISTEN ↔ BullMQ bridge, low memory.
      NODE_OPTIONS: "--max-old-space-size=96"
      # CRITICAL: direct PG URL — must NEVER route through a pooler
      # (PgBouncer, Neon's pooled endpoint, Supabase's transaction pooler).
      # assertDirectPgUrl() in packages/db/src/direct-url.ts exits fatally
      # on boot if it does. On Neon: use the "Direct connection" string.
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL:?DATABASE_DIRECT_URL required (managed direct PG URL, NOT pooled)}
      REDIS_BULL_URL: ${REDIS_BULL_URL:?REDIS_BULL_URL required}
      # Set to 1 when the BullMQ Redis is a managed provider that disables
      # the CONFIG command (e.g. Upstash). Verify noeviction in the
      # provider UI before enabling — see packages/queue/src/noeviction.ts.
      BULL_REDIS_SKIP_NOEVICTION_CHECK: ${BULL_REDIS_SKIP_NOEVICTION_CHECK:-}
    mem_limit: 160m
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:'+process.env.LISTEN_NOTIFY_PORT+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    <<: *app-base
    build:
      context: ../..
      dockerfile: ops/docker/worker.Dockerfile
    image: ${WORKER_IMAGE:-instigenie/worker:${VERSION:?VERSION required}}
    container_name: erp-worker
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_PORT: 4001
      # Default concurrency dropped from 4 → 2 for the 1GB host.
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      NODE_OPTIONS: "--max-old-space-size=160"
      # Pooled URL is fine for the worker (transactional access).
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required (managed pooled PG URL)}
      REDIS_BULL_URL: ${REDIS_BULL_URL:?REDIS_BULL_URL required}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:?REDIS_CACHE_URL required}
      # Set to 1 when BullMQ Redis is a managed provider that disables
      # CONFIG (e.g. Upstash). See packages/queue/src/noeviction.ts.
      BULL_REDIS_SKIP_NOEVICTION_CHECK: ${BULL_REDIS_SKIP_NOEVICTION_CHECK:-}
      # Email backend — see apps/worker/src/email/mailer.ts. Selection at
      # boot: SMTP_HOST takes priority, else RESEND_API_KEY, else
      # SKIPPED_DEV stub. EMAIL_DISABLED=true forces the stub.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_DISABLED: ${EMAIL_DISABLED:-false}
      MAIL_FROM: ${MAIL_FROM:-InstiGenie <onboarding@resend.dev>}
      MAIL_REPLY_TO: ${MAIL_REPLY_TO:-}
      WEB_ORIGIN: ${WEB_PUBLIC_URL:-http://localhost:3000}
    mem_limit: 256m
    depends_on:
      listen-notify:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:'+process.env.WORKER_PORT+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  api:
    <<: *app-base
    build:
      context: ../..
      dockerfile: ops/docker/api.Dockerfile
    image: ${API_IMAGE:-instigenie/api:${VERSION:?VERSION required}}
    container_name: erp-api
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: 4000
      HOST: 0.0.0.0
      NODE_OPTIONS: "--max-old-space-size=192"
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL required}
      # Vendor pool — REQUIRED on a single-box deploy where Postgres is
      # local. Falls back to DATABASE_URL only on managed-DB deploys where
      # the same superuser has cross-schema access. Locally we run the
      # vendor surface as the BYPASSRLS `instigenie_vendor` role; tenant
      # surface uses NOBYPASSRLS `instigenie_app`. Both are revoked from
      # each other's schema, so DON'T fall back to DATABASE_URL here.
      VENDOR_DATABASE_URL: ${VENDOR_DATABASE_URL:-${DATABASE_URL}}
      REDIS_BULL_URL: ${REDIS_BULL_URL:?REDIS_BULL_URL required}
      REDIS_CACHE_URL: ${REDIS_CACHE_URL:?REDIS_CACHE_URL required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required (≥32 bytes random)}
      JWT_ISSUER: ${JWT_ISSUER:-instigenie-api}
      ACCESS_TOKEN_TTL_SEC: ${ACCESS_TOKEN_TTL_SEC:-900}
      ESIGNATURE_PEPPER: ${ESIGNATURE_PEPPER:?ESIGNATURE_PEPPER required (≥32 chars)}
      WEB_ORIGIN: ${WEB_PUBLIC_URL:-http://localhost:3000}
    mem_limit: 288m
    depends_on:
      worker:
        condition: service_healthy
    ports:
      # Bind to localhost — Caddy fronts this. Override with API_BIND=0.0.0.0
      # only if you've removed Caddy and your network is segmented.
      - "${API_BIND:-127.0.0.1}:${API_PORT:-4000}:4000"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:'+process.env.PORT+'/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # ─── Reverse proxy + auto-HTTPS ─────────────────────────────────────────
  # Caddy terminates TLS for the api only — the web frontend is served
  # by Vercel and has its own TLS. Set API_HOSTNAME to your real DNS
  # name + point ports 80/443 at this host and Let's Encrypt certs are
  # obtained automatically.
  caddy:
    image: caddy:2-alpine
    container_name: erp-caddy
    restart: always
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      API_HOSTNAME: ${API_HOSTNAME:-api.localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@localhost}
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    mem_limit: 64m
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging: *default-logging
    networks: [erp]

# ─── Volumes ─────────────────────────────────────────────────────────────
# All stateful storage lives on the managed providers — no pg-data,
# pg-backups, or redis-bull-data volumes here. Managed Postgres handles
# its own backups; verify your provider's retention policy.
volumes:
  caddy-data:
    name: instigenie-prod-caddy-data
  caddy-config:
    name: instigenie-prod-caddy-config

# ─── Networks ────────────────────────────────────────────────────────────
networks:
  erp:
    name: instigenie-prod
    driver: bridge
