# nginx reverse proxy for Mobilab ERP.
#
# Single virtual host fronts both web (Next.js) and api (Fastify):
#   https://${DOMAIN}/         →  web:3000   (Next.js standalone)
#   https://${DOMAIN}/api/*    →  api:4000   (Fastify; /api prefix stripped)
#
# Templating: this file is mounted at /etc/nginx/templates/default.conf.template
# in the nginx container; the entrypoint runs `envsubst '$DOMAIN'` on it before
# starting nginx, so $DOMAIN is replaced with the value from the env block in
# docker-compose.single-box.yml.
#
# Cert files live in /etc/letsencrypt/live/${DOMAIN}/, written by certbot in
# webroot mode (/var/www/certbot for HTTP-01 challenges).

# ─── HTTP — handles ACME challenges + redirects everything else ──────────
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    # Let's Encrypt HTTP-01 challenge — must stay on plain HTTP.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # nginx liveness probe (used by docker healthcheck).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Everything else — redirect to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS — main vhost ──────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN};

    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # SSL hardening — TLS 1.2 floor, modern ciphers (Mozilla intermediate).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache  shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Compression.
    gzip on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml application/xml+rss
               text/javascript image/svg+xml;

    # Generous body size for PDF uploads / e-sig blobs.
    client_max_body_size 25m;

    # ─── /api/* → Fastify api (strip /api prefix) ────────────────────
    # Fastify routes are at root (/healthz, /auth/login, /vendor-admin/*).
    # `rewrite … break` strips /api before the proxy_pass.
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        # WebSocket support (in case any future endpoint uses it).
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout                 60s;
    }

    # ─── /healthz on https — short-circuit, don't proxy ──────────────
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── Everything else → Next.js web ───────────────────────────────
    location / {
        proxy_pass http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout                 60s;
    }
}
